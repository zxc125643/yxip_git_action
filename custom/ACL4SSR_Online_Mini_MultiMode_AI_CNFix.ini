[custom]
; ACL4SSR Mini MultiMode + AI group + China/CDN direct fix
; 目标：
; 1. AI 单独分流，避免落到漏网之鱼或频繁负载均衡。
; 2. 国内网站、国内图片、静态资源、常见 CDN 优先直连。
; 3. 暂不启用广告拦截，减少国内商品图、头像、封面图被误杀。

; ===== 直连基础 =====
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
